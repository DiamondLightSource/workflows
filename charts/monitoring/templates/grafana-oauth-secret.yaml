{{- if eq .Values.cluster "argus" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-oauth
  namespace: workflows
spec:
  encryptedData:
    client-id: 
    client-secret: 
  template:
    metadata:
      name: grafana-oauth
      namespace: workflows
    type: Opaque
{{- else if eq .Values.cluster "pollux" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-oauth
  namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    client-id: 
    client-secret: 
  template:
    metadata:
      name: grafana-oauth
      namespace: {{ .Release.Namespace }}
{{- end }}
