{{- if $.Values.authGateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: auth-gateway
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  selector:
    app: auth-gateway
  ports:
    - name: auth-gateway
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-gateway
  template:
    metadata:
      labels:
        app: auth-gateway
    spec:
      imagePullSecrets: {{ include "common.images.renderPullSecrets" (dict "images" (list $.Values.authGateway.image) "context" $ ) }}
      containers:
        - name: auth-gateway
          image: {{ include "common.images.image" ( dict "imageRoot" $.Values.authGateway.image "global" $.Values.global "chart" $.Chart ) }}
          imagePullPolicy: {{ $.Values.authGateway.image.pullPolicy }}
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
             path: /healthcheck
             port: 80
            failureThreshold: 3
            periodSeconds: 5
          env:
            - name: WORKFLOWS_AUTH_GATEWAY_CONFIG
              value: "/etc/auth-gateway/config.yaml"
            - name: GRAPH_URL
              value: {{ .Values.authGateway.graphUrl }}
            - name: RUST_BACKTRACE
              value: "1"
          volumeMounts:
            - name: auth-gateway-config
              mountPath: /etc/auth-gateway
              readOnly: true
      volumes:
        - name: auth-gateway-config
          secret:
            secretName: {{ .Values.authGateway.configuration.secretName | default "auth-gateway-config" }}
            items:
              - key: config.yaml
                path: config.yaml
  {{- end }}
