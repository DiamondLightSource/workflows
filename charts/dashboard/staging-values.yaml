configuration:
  keycloakUrl: https://identity-dev.diamond.ac.uk
  keycloakRealm: dls
  keycloakClient: workflows-ui-dev
  keycloakScope: "openid profile posix-uid email"
  graphUrl: https://staging.workflows.diamond.ac.uk/graphql
  graphWsUrl: wss://staging.workflows.diamond.ac.uk/graphql/ws
  sourceDir: "/usr/share/nginx/html"

ingress:
  hosts:
    - host: staging.workflows.diamond.ac.uk
      paths:
        - path: /
          pathType: Prefix
          service:
            name: dashboard
            port: 80
        - path: /api
          pathType: Prefix
          service:
            name: oidc-bff
            port: 80
        - path: /auth
          pathType: Prefix
          service:
            name: oidc-bff
            port: 80

  tls: true
  secretName: dashboard-tls-cert
  host: staging.workflows.diamond.ac.uk

oidcBff:
  enabled: true
  image:
    registry: ghcr.io
    repository: diamondlightsource/workflows-oidc-bff
    tag: "davehadley"
    digest: "sha256:e259494171d5115d060dd9f3d9da971312d39e9afabd91478c0b7a49c7c5f6d3"
    pullPolicy: IfNotPresent
    pullSecrets: []
  configuration:
    secretName: oidc-bff-config
