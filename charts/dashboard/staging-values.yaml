configuration:
  keycloakUrl: https://identity-test.diamond.ac.uk
  keycloakRealm: dls
  keycloakClient: workflows-ui-dev
  keycloakScope: "openid profile posix-uid email"
  graphUrl: https://staging.workflows.diamond.ac.uk/graphql
  graphWsUrl: wss://staging.workflows.diamond.ac.uk/graphql/ws
  sourceDir: "/usr/share/nginx/html"

ingress:
  hosts:
    - host: staging.workflows.diamond.ac.uk
      paths:
        - path: /
          pathType: Prefix
          service:
            name: dashboard
            port: 80
        - path: /api
          pathType: Prefix
          service:
            name: oidc-bff
            port: 80
        - path: /auth
          pathType: Prefix
          service:
            name: oidc-bff
            port: 80

  tls: true
  secretName: dashboard-tls-cert
  host: staging.workflows.diamond.ac.uk

oidcBff:
  enabled: true
  image:
    registry: ghcr.io
    repository: diamondlightsource/oidc-bff
    tag: "tbt"
    digest: "sha256:105cf0c8221b78749e1c201e0f588d76f85ac6f5447856e53f988c01600722da"
    pullPolicy: IfNotPresent
    pullSecrets: []
  configuration:
    secretName: oidc-bff-config
