configuration:
  keycloakUrl: https://identity-test.diamond.ac.uk
  keycloakRealm: dls
  keycloakClient: workflows-ui-dev
  keycloakScope: openid profile posix-uid email
  graphUrl: https://staging.workflows.diamond.ac.uk/graphql
  graphWsUrl: wss://staging.workflows.diamond.ac.uk/graphql/ws
  sourceDir: /usr/share/nginx/html
ingress:
  hosts:
    - host: staging.workflows.diamond.ac.uk
      paths:
        - path: /
          pathType: Prefix
          service:
            name: dashboard
            port: 80
        - path: /api
          pathType: Prefix
          service:
            name: auth-gateway
            port: 80
        - path: /auth
          pathType: Prefix
          service:
            name: auth-gateway
            port: 80
  tls: true
  secretName: dashboard-tls-cert
  host: staging.workflows.diamond.ac.uk
authGateway:
  enabled: true
  image:
    registry: ghcr.io
    repository: diamondlightsource/workflows-auth-gateway
    tag: 0.1.0
    digest: sha256:b4dd2991fc67bb13b432e48821351aefa6487c4f3417c74f2d86cb19634b7760
    pullPolicy: IfNotPresent
    pullSecrets: []
  graphUrl: https://staging.workflows.diamond.ac.uk/graphql
  configuration:
    secretName: auth-gateway-config
