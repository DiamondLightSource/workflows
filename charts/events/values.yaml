argo-events:
  enabled: true
  controller:
    containerSecurityContext:
      runAsUser: 36055
      runAsGroup: 36055
    resources:
      requests:
        cpu: 100m
        memory: 2Gi
      limits:
        cpu: 1
        memory: 4Gi

eventBuses:
  - name: default
    namespace: events
    resources:
      requests:
        cpu: 10m
        memory: 1Gi
      limits:
        cpu: 100m
        memory: 4Gi

eventSources:
  - name: example
    beamline: test-beamline
    port: 12000
    webhook:
      # event-source can run multiple HTTP servers. Simply define a unique port to start a new HTTP server
      example:
        # port to run HTTP server on
        port: "12000"
        # endpoint to listen to
        endpoint: /example
        # HTTP request method to allow. In this case, only POST requests are accepted
        method: POST

genericServers:
  stomp:
    enabled: true
    logLevel: INFO

metacontroller:
  enabled: true
  commandArgs: ["--zap-log-level=2"]
