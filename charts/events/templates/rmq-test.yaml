apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-demo
  template:
    metadata:
      labels:
        app: rabbitmq-demo
    spec:
      containers:
        - name: rabbitmq
          image: ghcr.io/jamesdoingstuff/rmq-demo
          ports:
            - containerPort: 5672
            - containerPort: 15692
            - containerPort: 61613
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-demo
spec:
  selector:
    app: rabbitmq-demo
  ports:
    - name: stomp
      port: 61613
      targetPort: 61613
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15692
      targetPort: 15692
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rmq-producer
data:
  {{- (.Files.Glob "generic-servers/rmq-producer.py").AsConfig | nindent 2 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-producer
  template:
    metadata:
      labels:
        app: rabbitmq-producer
        app.kubernetes.io/name: rabbitmq-producer
    spec:
      containers:
        - name: client
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install stomp.py --disable-pip-version-check --root-user-action=ignore
              python /scripts/rmq-producer.py
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
      volumes:
        - name: script-volume
          configMap:
            name: stomp-server
