{{- if .Values.metacontroller.enabled -}}
apiVersion: workflows.diamond.ac.uk/v1alpha1
kind: Trigger
metadata:
  name: example-trigger
  labels:
    # workflows.diamond.ac.uk/source: webhook
    workflows.diamond.ac.uk/beamline: test-beamline
spec:
  enabled: true
  webhook:
    eventName: example
    workflow:
      workflowTemplate: example-template
      parameters:
        - name: tif
          path: body.parameters.tif
        - name: tiff
          path: body.parameters.tiff
        - name: png
          path: body.parameters.png
          default: "true"
