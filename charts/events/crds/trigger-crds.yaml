apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustertriggertemplates.workflows.diamond.ac.uk
spec:
  group: workflows.diamond.ac.uk
  names:
    kind: ClusterTriggerTemplate
    plural: clustertriggertemplates
    singular: clustertriggertemplate
    shortNames:
      - ctt
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: true
                eventName:
                  type: string
                workflow:
                  type: object
                  required: [template]
                  properties:
                    template:
                      type: string
                    triggerOnMessageType:
                      type: string
                      pattern: "^(start|stop)$"
                    parameters:
                      type: array
                      default: []
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          path:
                            type: string
                          default:
                            type: string
                        anyOf:
                          - required: [name, path]
                          - required: [name, default]
              required:
                - workflow
                - eventName
          required:
            - spec
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: triggers.workflows.diamond.ac.uk
spec:
  group: workflows.diamond.ac.uk
  names:
    kind: Trigger
    plural: triggers
    singular: trigger
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                templateRef:
                  type: string
                enabled:
                  type: boolean
                  default: true
                eventName:
                  type: string
                workflow:
                  type: object
                  required: [template]
                  properties:
                    template:
                      type: string
                    triggerOnMessageType:
                      type: string
                      pattern: "^(start|stop)$"
                    parameters:
                      type: array
                      default: []
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          path:
                            type: string
                          default:
                            type: string
                        anyOf:
                          - required: [name, path]
                          - required: [name, default]
              required:
                - workflow
                - eventName
          required:
            - spec
      subresources:
        status: {}
