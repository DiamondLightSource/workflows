{{- if .Values.policy.enable }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ include "common.names.fullname" $ }}-mutate-argo-workflow-security-context
spec:
  background: false
  rules:
    - name: inject-posix-ids
      match:
        any:
          - resources:
              kinds:
                - argoproj.io/v1alpha1/Workflow
              operations:
                - CREATE
      context:
        - name: posixUidString
          variable:
            value: "{{`{{ request.userInfo.extra.\"workflows.diamond.ac.uk/posixuid\"[0] }}`}}"
        
        - name: userProfile
          apiCall:
            urlPath: "/apis/workflows.internal.diamond.ac.uk/v1/useridentities/{{`{{ posixUidString }}`}}"
            jmesPath: "spec"
            
      mutate:
        patchStrategicMerge:
          spec:
            securityContext:
              runAsUser: "{{`{{ userProfile.uid }}`}}"
              runAsGroup: "{{`{{ userProfile.gid }}`}}"
              supplementalGroups: "{{`{{ userProfile.supplementalGroups }}`}}"
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ include "common.names.fullname" $ }}-pod-security-context
  annotations:
    pod-policies.kyverno.io/autogen-controllers: none
spec:
  background: false
  validationFailureAction: Enforce
  schemaValidation: false
  rules:
    - name: pod-securitycontext
      match:
        resources:
          kinds:
            - Pod
          operations:
            - CREATE
          namespaceSelector:
            matchLabels:
              app.kubernetes.io/managed-by: sessionspaces
      mutate:
        patchStrategicMerge:
          spec:
            containers:
              - (name): "*"
                securityContext:
                  runAsGroup: "{{ `{{request.object.spec.securityContext.runAsGroup}}` }}"
                  runAsUser: "{{ `{{request.object.spec.securityContext.runAsUser}}` }}"
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
            initContainers:
              - (name): "*"
                securityContext:
                  runAsGroup: "{{ `{{request.object.spec.securityContext.runAsGroup}}` }}"
                  runAsUser: "{{ `{{request.object.spec.securityContext.runAsUser}}` }}"
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
            ephemeralContainers:
              - (name): "*"
                securityContext:
                  runAsGroup: "{{ `{{request.object.spec.securityContext.runAsGroup}}` }}"
                  runAsUser: "{{ `{{request.object.spec.securityContext.runAsUser}}` }}"
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
{{- end }}