apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "identity-mapper.fullname" . }}
  labels:
    {{- include "identity-mapper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "identity-mapper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "identity-mapper.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "identity-mapper.serviceAccountName" . }}
      containers:
        - name: identity-mapper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.container.portName }}
              containerPort: {{ .Values.settings.port }}
              protocol: TCP

          env:
            - name: IDENTITY_MAPPER_PORT
              value: {{ .Values.settings.port | quote }}
            - name: IDENTITY_MAPPER_HOST
              value: {{ .Values.settings.host | quote }}
            - name: IDENTITY_MAPPER_LDAP_SERVER
              value: {{ .Values.settings.ldap_server | quote }}
            - name: IDENTITY_MAPPER_BASE_DN
              value: {{ .Values.settings.base_dn | quote }}
            - name: IDENTITY_MAPPER_CACHE_TTL
              value: {{ .Values.settings.cache_ttl | quote }}
            - name: IDENTITY_MAPPER_CACHE_MAX_SIZE
              value: {{ .Values.settings.cache_max_size | quote }}

            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}

          {{- if and .Values.tls.enabled (or .Values.tls.existingSecret .Values.tls.certManager.enabled) }}
          volumeMounts:
            - name: tls
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
          {{- end }}

          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            {{- if .Values.probes.liveness.tcpSocket }}
            tcpSocket:
              port: {{ .Values.settings.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}

          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            {{- if .Values.probes.readiness.tcpSocket }}
            tcpSocket:
              port: {{ .Values.settings.port }}
            {{- end }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- if and .Values.tls.enabled (or .Values.tls.existingSecret .Values.tls.certManager.enabled) }}
      volumes:
        - name: tls
          secret:
            secretName: {{ default (printf "%s-tls" (include "identity-mapper.fullname" .)) .Values.tls.existingSecret }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}