{{- if .Values.openbao.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  destination:
    namespace: openbao
    server: {{ .Values.destination.server }}
  project: default
  source:
    repoURL: https://github.com/DiamondLightSource/workflows.git
    path: charts/openbao
    targetRevision: {{ .Values.openbao.targetRevision }}
    helm:
      valueFiles:
        - values.yaml
        {{- if .Values.openbao.extraValueFiles }}
        {{- .Values.openbao.extraValueFiles | toYaml | nindent 8 }}
        {{- end }}
      {{- if .Values.openbao.valuesObject }}
      valuesObject:
        {{- .Values.openbao.valuesObject | toYaml | nindent 8 }}
      {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
{{- end }}
