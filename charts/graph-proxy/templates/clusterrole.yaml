{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "common.names.fullname" $ }}
rules:
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
  - apiGroups:
      - workflows.diamond.ac.uk
    resources:
      - triggers
    verbs:
      - get
      - list
      - patch
      - create
      - delete
{{- end }}
