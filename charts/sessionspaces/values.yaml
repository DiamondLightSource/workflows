database:
  create: false
  host: mysql://ispybdbproxy.diamond.ac.uk:4306/ispyb
  user: ispyb_ro
  password:
    secretName: ""
    secretKey: ""
    value: ""
ldapUrl: ldap://ldapmaster.diamond.ac.uk
requestRate: 1

image:
  repository: ghcr.io/diamondlightsource/workflows-sessionspaces
  pullPolicy: Always
  imagePullSecrets: []
  tag: ""

deployment:
  annotations: []
  podAnnotations:
    fluentd-ignore: "true"
  resources:
    requests:
      cpu: 100m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  nodeSelector: {}
  affinity: {}
  tolerations: []

policy:
  create: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

secret:
  create: true

nameOverride: ""
fullnameOverride: ""

telemetry:
  level: Info
  metricsEndpoint: https://otelcollector.workflows.diamond.ac.uk/v1/metrics
  tracingEndpoint: https://otelcollector.workflows.diamond.ac.uk/v1/traces

staticSessions:
  enabled: true
  sessions:
    - data_directory: /dls/science/groups/das/workflows-platform/production
      proposal_code: ks
      proposal_number: 10000
      visits: [1, 2, 3, 4, 5]
      instrument: t01
      members: []
      gid: 123456
      start_date: "2024-01-01 00:00:00"
      end_date: "2099-12-31 23:59:59"
