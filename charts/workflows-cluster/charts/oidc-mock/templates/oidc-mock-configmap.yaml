{{- if $.Values.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: oidc-mock-configmap
  namespace: {{ .Release.Namespace }}
data:
  ASPNETCORE_ENVIRONMENT: Development
  SERVER_OPTIONS_INLINE: |
    {
      "AccessTokenJwtType": "JWT",
      "Discovery": {
        "ShowKeySet": true
      },
      "Authentication": {
        "CookieSameSiteMode": "Lax",
        "CheckSessionCookieSameSiteMode": "Lax"
      }
    }
  LOGIN_OPTIONS_INLINE: |
    {
      "AllowRememberLogin": false
    }
  LOGOUT_OPTIONS_INLINE: |
    {
      "AutomaticRedirectAfterSignOut": true
    }
  API_SCOPES_INLINE: |
    - Name: workflows-cluster
  API_RESOURCES_INLINE: |
    - Name: workflows-cluster
      Scopes:
        - developer-scope
  USERS_CONFIGURATION_INLINE: |
    [
      {
        "SubjectId":"1",
        "Username":"Dev",
        "Password":"dev-password",
        "Claims": [
          {
            "Type": "email",
            "Value": "developer@diamond.ac.uk",
            "ValueType": "string"
          },
          {
            "Type": "fedid",
            "Value": "fed1234",
            "ValueType": "string"
          },
          {
            "Type": "groups",
            "Value": "dasc",
            "ValueType": "string"
          },
          {
            "Type": "posix-uid",
            "Value": "posix123",
            "ValueType": "string"
          },
        ]
      }
    ]
  CLIENTS_CONFIGURATION_INLINE: |
    [
      {
        "ClientId": "implicit-mock-client",
        "Description": "Client for implicit flow",
        "AllowedGrantTypes": ["implicit"],
        "AllowAccessTokensViaBrowser": true,
        "RedirectUris": ["http://localhost:3000/auth/oidc", "http://localhost:4004/auth/oidc"],
        "AllowedScopes": ["openid", "profile", "email"],
        "IdentityTokenLifetime": 3600,
        "AccessTokenLifetime": 3600
      },
      {
        "ClientId": "client-credentials-mock-client",
        "ClientSecrets": ["client-credentials-mock-client-secret"],
        "Description": "Client for client credentials flow",
        "AllowedGrantTypes": ["client_credentials"],
        "AllowedScopes": ["developer-scope"],
        "ClientClaimsPrefix": "",
        "Claims": [
          {
            "Type": "string_claim",
            "Value": "string_claim_value",
            "ValueType": "string"
          },
          {
            "Type": "json_claim",
            "Value": "[\"value1\", \"value2\"]",
            "ValueType": "json"
          }
        ]
      }
    ]
  ASPNET_SERVICES_OPTIONS_INLINE: |
    {
      "ForwardedHeadersOptions": {
        "ForwardedHeaders" : "All"
      }
    }
{{- end }}
