{{- if eq .Values.cluster "argus" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rclone-config
  namespace: workflows
spec:
  encryptedData:
    rclone.conf: 
  template:
    metadata:
      name: rclone-config
      namespace: workflows
    type: Opaque
{{- else if eq .Values.cluster "pollux" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rclone-config
  namespace: workflows
spec:
  encryptedData:
    rclone.conf: 
  template:
    metadata:
      name: rclone-config
      namespace: workflows
    type: Opaque
{{ else }}
{{- end }}
