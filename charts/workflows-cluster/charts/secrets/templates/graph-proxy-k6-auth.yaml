{{- if eq .Values.cluster "argus" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: graph-proxy-k6-auth
  namespace: workflows
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    KEYCLOAK_CLIENT_ID: 
    KEYCLOAK_CLIENT_SECRET: 
  template:
    metadata:
      name: graph-proxy-k6-auth
      namespace: workflows
    type: Opaque
{{- else if eq .Values.cluster "pollux" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: graph-proxy-k6-auth
  namespace: workflows
  labels:
    app.kubernetes.io/managed-by: Helm
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
spec:
  encryptedData:
    KEYCLOAK_CLIENT_ID: 
    KEYCLOAK_CLIENT_SECRET: 
  template:
    metadata:
      name: graph-proxy-k6-auth
      namespace: workflows
    type: Opaque
{{- end }}
