{{- if eq .Values.cluster "argus" }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: auth-keys
  namespace: workflows
spec:
  encryptedData:
    encryption_private_key: 
    encryption_public_key: 
  template:
    metadata:
      name: auth-keys
      namespace: workflows
    type: Opaque
{{- else if eq .Values.cluster "pollux" }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: auth-keys
  namespace: workflows
spec:
  encryptedData:
    encryption_private_key: 
    encryption_public_key: 
  template:
    metadata:
      name: auth-keys
      namespace: workflows
    type: Opaque
{{- end }}
