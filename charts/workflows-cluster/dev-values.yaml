vcluster:
  controlPlane:
    distro:
      k8s:
        apiServer:
          extraArgs: []
    backingStore:
      etcd:
        deploy:
          statefulSet:
            resources:
              limits:
                cpu: 200m
                memory: 500Mi
              requests:
                cpu: 100m
                memory: 250Mi
            highAvailability:
              replicas: 1
            persistence:
              volumeClaim:
                storageClass: netapp
    coredns:
      deployment:
        replicas: 1
        resources:
          limits:
            cpu: 200m
            memory: 500Mi
          requests:
            cpu: 100m
            memory: 250Mi
    statefulSet:
      persistence:
        addVolumes: []
        addVolumeMounts: []
      highAvailability:
        replicas: 1
      resources:
        limits:
          cpu: 2
          ephemeral-storage: 2Gi
          memory: 1Gi
        requests:
          cpu: 2000m
          memory: 500Mi
  experimental:
    deploy:
      vcluster:
        helm:
          - chart:
              name: argo-cd
              version: 7.7.5
              repo: https://argoproj.github.io/argo-helm
            release:
              name: argocd
              namespace: argocd
            values: |-
              controller:
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 300m
                    memory: 256Mi
              dex:
                resources:
                  limits:
                    cpu: 50m
                    memory: 512Mi
                  requests:
                    cpu: 10m
                    memory: 256Mi
              redisSecretInit:
                resources:
                  limits:
                    cpu: 200m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              redis:
                resources:
                  limits:
                    cpu: 200m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              server:
                resources:
                  limits:
                    cpu: 200m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              repoServer:
                resources:
                  limits:
                    cpu: 600m
                    memory: 1024Mi
                  requests:
                    cpu: 200m
                    memory: 512Mi
              applicationSet:
                resources:
                  limits:
                    cpu: 200m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
              notifications:
                resources:
                  limits:
                    cpu: 50m
                    memory: 512Mi
                  requests:
                    cpu: 10m
                    memory: 256Mi
          - release:
              name: verflixt
              namespace: argocd
            # This is the `charts/verflixt` chart as a packaged base64 string.
            # You can re-create it with `helm package charts/verflixt && base64 aoa-*.tgz`.
            # This hack allows us to deploy manifests in a deterministic order, which is not possible using `manifests`.
            bundle: 
            values: |-
              apiVersion: argoproj.io/v1alpha1
              kind: Application
              metadata:
                name: apps
                namespace: argocd
                annotations:
                  argocd.argoproj.io/sync-wave: "0"
              spec:
                destination:
                  namespace: argocd
                  server: https://kubernetes.default.svc
                project: default
                source:
                  helm:
                    valueFiles:
                      - dev-values.yaml
                  path: charts/apps
                  repoURL: https://github.com/DiamondLightSource/workflows.git
                  targetRevision: HEAD
                syncPolicy:
                  automated:
                    prune: true
                    selfHeal: true

ingress:
  enabled: false

oidc-mock:
  enabled: true
  replicas: 1
  template:
    podAnnotations: []
    labels: []
  image:
    image: ghcr.io/soluto/oidc-server-mock
    imagePullPolicy: Always
    port: 8080

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  env:
    - name: ASPNETCORE_ENVIRONMENT
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: ASPNETCORE_ENVIRONMENT
    - name: SERVER_OPTIONS_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: SERVER_OPTIONS_INLINE
    - name: LOGIN_OPTIONS_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: LOGIN_OPTIONS_INLINE
    - name: LOGOUT_OPTIONS_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: LOGOUT_OPTIONS_INLINE
    - name: API_SCOPES_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: API_SCOPES_INLINE
    - name: API_RESOURCES_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: API_RESOURCES_INLINE
    - name: USERS_CONFIGURATION_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: USERS_CONFIGURATION_INLINE
    - name: CLIENTS_CONFIGURATION_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: CLIENTS_CONFIGURATION_INLINE
    - name: ASPNET_SERVICES_OPTIONS_INLINE
      valueFrom:
        configMapKeyRef:
          name: oidc-mock-configmap
          key: ASPNET_SERVICES_OPTIONS_INLINE

  nodeSelector: []
  affinity: []
  tolerations: []

authenticationConfiguration:
  enabled: true
  data:
    jwt:
      - issuer:
          url:
            valueFrom:
              configMapKeyRef:
                name: authn-config-configmap
              key: mock-url
          discoveryURL:
            valueFrom:
              configMapKeyRef:
                name: authn-config-configmap
                key: mock-discovery-url
          audiences:
            - workflows-cluster
          audienceMatchPolicy: MatchAny
        claimMappings:
          username:
            claim: fedid
          groups:
            claim: groups
          uid:
            claim: fedid
          posix-uid:
            claim: posix-uid
