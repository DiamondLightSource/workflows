apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "auth-broker.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auth-broker.labels" . | nindent 4 }}
# Do not auto-mount into every pod that names this SA; the auth-broker Deployment
# opts in explicitly. This SA's token can read any pod/workflow, so limit where it lands.
automountServiceAccountToken: false
