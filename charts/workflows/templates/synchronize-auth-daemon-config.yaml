---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auth-daemon-config-cloner
  namespace: workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auth-daemon-config-cloner
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["list", "get", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auth-daemon-config-cloner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: auth-daemon-config-cloner
subjects:
  - kind: ServiceAccount
    name: auth-daemon-config-cloner
    namespace: workflows
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: auth-daemon-config-cloner
  namespace: workflows
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["auth-daemon-config"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: auth-daemon-config-cloner
  namespace: workflows
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: auth-daemon-config-cloner
subjects:
  - kind: ServiceAccount
    name: auth-daemon-config-cloner
    namespace: workflows

