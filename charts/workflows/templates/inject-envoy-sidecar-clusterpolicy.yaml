{{- if .Values.authenticatedWorkflows.enableEnvoy }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ .Release.Name }}-inject-envoy-sidecar
spec:
  validationFailureAction: Enforce
  background: false

  rules:
    - name: inject-envoy-sidecar
      match:
        any:
          - resources:
              kinds:
                - argoproj.io/v1alpha1/Workflow
              operations:
                - CREATE

      preconditions:
        all:
          - key: "{{ `{{ request.object.metadata.annotations.\"workflows.diamond.ac.uk/authenticated\" || '' }}` }}"
            operator: Equals
            value: "true"

          - key: '{{ "{{ (request.object.spec.templateDefaults.initContainers || `[]`)[?name == ''auth-init''] | length(@) }}" }}'
            operator: Equals
            value: 0

      mutate:
        patchStrategicMerge:
          spec:
            templateDefaults:
              volumes:
                - name: envoy-config
                  emptyDir: {}

              initContainers:
                - name: auth-init
                  image: busybox:1.36
                  command:
                    - /bin/sh
                    - -c
                    - |
                      cat > /etc/envoy/envoy.yaml << 'ENVOYEOF'
                      static_resources:
                        listeners:
                        - name: ingress
                          address:
                            socket_address:
                              address: 0.0.0.0
                              port_value: 6000
                          filter_chains:
                          - filters:
                            - name: envoy.filters.network.http_connection_manager
                              typed_config:
                                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                                stat_prefix: ingress
                                route_config:
                                  name: local_route
                                  virtual_hosts:
                                  - name: graph_backend
                                    domains:
                                    - "*"
                                    routes:
                                    - match:
                                        prefix: "/"
                                      route:
                                        cluster: graph-upstream
                                        timeout: 30s
                                        host_rewrite_literal: staging.workflows.diamond.ac.uk
                                      typed_per_filter_config:
                                        envoy.filters.http.ext_authz:
                                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                          disabled: false

                                http_filters:
                                #
                                # Add the pod service account token for the auth-broker check.
                                #
                                - name: envoy.filters.http.lua
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                                    default_source_code:
                                      inline_string: |
                                        function envoy_on_request(request_handle)
                                          request_handle:headers():replace(
                                            "k8s-pod-service-account-token",
                                            "test-token")
                                        end

                                #
                                # Ask auth-broker to authenticate/authorise this request.
                                # If auth-broker returns an Authorization header, Envoy is allowed
                                # to pass that header to the upstream GraphQL service.
                                #
                                - name: envoy.filters.http.ext_authz
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                                    transport_api_version: V3

                                    allowed_headers:
                                      patterns:
                                      - exact: "K8s-Pod-Service-Account-Token"
                                      - exact: "content-type"
                                      - exact: "authorization"
                                      - exact: "host"
                                      - exact: ":method"
                                      - exact: ":path"
                                      - exact: ":authority"

                                    with_request_body:
                                      max_request_bytes: 1048576
                                      allow_partial_message: true
                                    http_service:
                                      server_uri:
                                        uri: http://auth-broker.auth-broker.svc.cluster.local:8080
                                        cluster: auth-broker
                                        timeout: 5s
                                      authorization_response:
                                        allowed_upstream_headers:
                                          patterns:
                                          - exact: "authorization"

                                #
                                # Do not leak the Kubernetes service account token to GraphQL.
                                # It is only for auth-broker.
                                #
                                # - name: envoy.filters.http.lua
                                #   typed_config:
                                #     "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                                #     default_source_code:
                                #       inline_string: |
                                #         function envoy_on_request(request_handle)
                                #           request_handle:headers():remove("K8s-Pod-Service-Account-Token")
                                #         end

                                - name: envoy.filters.http.router
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                        clusters:
                        - name: graph-upstream
                          connect_timeout: 5s
                          type: STRICT_DNS
                          lb_policy: ROUND_ROBIN
                          load_assignment:
                            cluster_name: graph-upstream
                            endpoints:
                            - lb_endpoints:
                              - endpoint:
                                  address:
                                    socket_address:
                                      address: staging.workflows.diamond.ac.uk
                                      port_value: 443
                          transport_socket:
                            name: envoy.transport_sockets.tls
                            typed_config:
                              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
                              sni: staging.workflows.diamond.ac.uk

                        - name: auth-broker
                          connect_timeout: 5s
                          type: STRICT_DNS
                          lb_policy: ROUND_ROBIN
                          load_assignment:
                            cluster_name: auth-broker
                            endpoints:
                            - lb_endpoints:
                              - endpoint:
                                  address:
                                    socket_address:
                                      address: auth-broker.auth-broker.svc.cluster.local
                                      port_value: 8080
                      ENVOYEOF
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy

                - name: auth-envoy-validate
                  image: envoyproxy/envoy:distroless-v1.39.0
                  command:
                    - /usr/local/bin/envoy
                  args:
                    - --mode
                    - validate
                    - -c
                    - /etc/envoy/envoy.yaml
                    - --log-level
                    - info
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy

                - name: auth-envoy
                  image: envoyproxy/envoy:distroless-v1.39.0
                  restartPolicy: Always
                  args:
                    - "-c"
                    - "/etc/envoy/envoy.yaml"
                    - "--log-level"
                    - "info"
                  startupProbe:
                    tcpSocket:
                      port: 6000
                    initialDelaySeconds: 1
                    periodSeconds: 1
                    failureThreshold: 30
                    timeoutSeconds: 1
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy
                  securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                        - ALL

              container:
                env:
                  - name: GRAPH_URL
                    value: "http://127.0.0.1:6000/graphql"

              script:
                env:
                  - name: GRAPH_URL
                    value: "http://127.0.0.1:6000/graphql"
{{- end }}



