{{- if .Values.authenticatedWorkflows.enableEnvoy }}
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: {{ .Release.Name }}-inject-envoy-sidecar
spec:
  validationFailureAction: Enforce
  background: false

  rules:
    - name: inject-envoy-sidecar
      match:
        any:
          - resources:
              kinds:
                - argoproj.io/v1alpha1/Workflow
              operations:
                - CREATE

      preconditions:
        all:
          - key: "{{ `{{ request.object.metadata.annotations.\"workflows.diamond.ac.uk/authenticated\" || '' }}` }}"
            operator: Equals
            value: "true"

          - key: '{{ "{{ (request.object.spec.templateDefaults.initContainers || `[]`)[?name == ''auth-init''] | length(@) }}" }}'
            operator: Equals
            value: 0

      mutate:
        patchStrategicMerge:
          spec:
            templateDefaults:
              volumes:
                - name: envoy-config
                  emptyDir: {}

              initContainers:
                - name: auth-init
                  image: busybox:1.36
                  command:
                    - /bin/sh
                    - -c
                    - |
                      cat > /etc/envoy/envoy.yaml << 'ENVOYEOF'
                      static_resources:
                        listeners:
                        - name: ingress
                          address:
                            socket_address:
                              address: 0.0.0.0
                              port_value: 6000
                          filter_chains:
                          - filters:
                            - name: envoy.filters.network.http_connection_manager
                              typed_config:
                                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                                stat_prefix: ingress

                                # Required for explicit HTTPS_PROXY traffic. Clients will send CONNECT
                                # foo.diamond.ac.uk:443 HTTP/1.1 to this listener.
                                upgrade_configs:
                                - upgrade_type: CONNECT

                                route_config:
                                  name: local_route
                                  virtual_hosts:
                                  #
                                  # Authenticated egress for Diamond hosts.
                                  #
                                  # Include :443 because HTTPS proxy traffic normally routes by
                                  # CONNECT authority, e.g. foo.diamond.ac.uk:443.
                                  #
                                  - name: diamond_authenticated
                                    domains:
                                    - "*.diamond.ac.uk"
                                    - "*.diamond.ac.uk:443"
                                    - "*.diamond.ac.uk:80"

                                    routes:
                                    # HTTPS explicit proxy traffic.
                                    - match:
                                        connect_matcher: {}
                                      route:
                                        cluster: dynamic_forward_proxy_cluster
                                        timeout: 0s
                                        upgrade_configs:
                                        - upgrade_type: CONNECT
                                          enabled: true
                                      typed_per_filter_config:
                                        envoy.filters.http.ext_authz:
                                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                          disabled: false

                                    # Plain HTTP proxy traffic.
                                    - match:
                                        prefix: "/"
                                      route:
                                        cluster: dynamic_forward_proxy_cluster
                                        timeout: 30s
                                      typed_per_filter_config:
                                        envoy.filters.http.ext_authz:
                                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                          disabled: false

                                  #
                                  # Everything else is just proxied directly, without ext_authz.
                                  #
                                  - name: default_passthrough
                                    domains:
                                    - "*"
                                    routes:
                                    # HTTPS explicit proxy traffic.
                                    - match:
                                        connect_matcher: {}
                                      route:
                                        cluster: dynamic_forward_proxy_cluster
                                        timeout: 0s
                                        upgrade_configs:
                                        - upgrade_type: CONNECT
                                          enabled: true
                                      typed_per_filter_config:
                                        envoy.filters.http.ext_authz:
                                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                          disabled: true

                                    # Plain HTTP proxy traffic.
                                    - match:
                                        prefix: "/"
                                      route:
                                        cluster: dynamic_forward_proxy_cluster
                                        timeout: 30s
                                      typed_per_filter_config:
                                        envoy.filters.http.ext_authz:
                                          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                                          disabled: true

                                http_filters:
                                - name: envoy.filters.http.lua
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                                    default_source_code:
                                      inline_string: |
                                        function envoy_on_request(request_handle)
                                          local f = io.open("/var/run/secrets/kubernetes.io/serviceaccount/token", "r")
                                          if f then
                                            local token = f:read("*a")
                                            f:close()
                                            request_handle:headers():replace("K8s-Pod-Service-Account-Token", token)
                                          end
                                        end

                                - name: envoy.filters.http.ext_authz
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                                    transport_api_version: V3
                                    with_request_body:
                                      max_request_bytes: 1048576
                                    http_service:
                                      server_uri:
                                        uri: http://auth-broker.auth-broker.svc.cluster.local:8080
                                        cluster: auth-broker
                                        timeout: 5s
                                      authorization_request:
                                        allowed_headers:
                                          patterns:
                                          - exact: "K8s-Pod-Service-Account-Token"
                                          - exact: "content-type"
                                          - exact: "authorization"
                                          - exact: ":method"
                                          - exact: ":authority"
                                          - exact: ":path"
                                          - exact: "host"
                                      authorization_response:
                                        allowed_upstream_headers:
                                          patterns:
                                          - exact: "authorization"

                                - name: envoy.filters.http.dynamic_forward_proxy
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                                    dns_cache_config:
                                      name: dynamic_forward_proxy_cache
                                      dns_lookup_family: V4_ONLY

                                - name: envoy.filters.http.router
                                  typed_config:
                                    "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

                        clusters:
                        - name: dynamic_forward_proxy_cluster
                          connect_timeout: 5s
                          lb_policy: CLUSTER_PROVIDED
                          cluster_type:
                            name: envoy.clusters.dynamic_forward_proxy
                            typed_config:
                              "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
                              dns_cache_config:
                                name: dynamic_forward_proxy_cache
                                dns_lookup_family: V4_ONLY

                        - name: auth-broker
                          connect_timeout: 5s
                          type: STRICT_DNS
                          lb_policy: ROUND_ROBIN
                          load_assignment:
                            cluster_name: auth-broker
                            endpoints:
                            - lb_endpoints:
                              - endpoint:
                                  address:
                                    socket_address:
                                      address: auth-broker.auth-broker.svc.cluster.local
                                      port_value: 8080
                      ENVOYEOF
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy

                - name: auth-envoy-validate
                  image: envoyproxy/envoy:distroless-v1.39.0
                  command:
                    - /usr/local/bin/envoy
                  args:
                    - --mode
                    - validate
                    - -c
                    - /etc/envoy/envoy.yaml
                    - --log-level
                    - info
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy

                - name: auth-envoy
                  image: envoyproxy/envoy:distroless-v1.39.0
                  restartPolicy: Always
                  args:
                    - "-c"
                    - "/etc/envoy/envoy.yaml"
                    - "--log-level"
                    - "info"
                  startupProbe:
                    tcpSocket:
                      port: 6000
                    initialDelaySeconds: 1
                    periodSeconds: 1
                    failureThreshold: 30
                    timeoutSeconds: 1
                  volumeMounts:
                    - name: envoy-config
                      mountPath: /etc/envoy
                  securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                        - ALL

              container:
                env:
                  - name: HTTP_PROXY
                    value: "http://127.0.0.1:6000"
                  - name: HTTPS_PROXY
                    value: "http://127.0.0.1:6000"
                  - name: NO_PROXY
                    value: "localhost,127.0.0.1,.svc,.svc.cluster.local"

              script:
                env:
                  - name: HTTP_PROXY
                    value: "http://127.0.0.1:6000"
                  - name: HTTPS_PROXY
                    value: "http://127.0.0.1:6000"
                  - name: NO_PROXY
                    value: "localhost,127.0.0.1,.svc,.svc.cluster.local"
{{- end }}



