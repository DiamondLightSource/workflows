argo-workflows:
  artifactRepository:
    s3:
      bucket: k8s-workflows-staging

oauth2-proxy:
  alphaConfig:
    configData:
      providers:
        - provider: oidc
          scope: "openid posix-uid profile email fedid"
          clientId: workflows-argo-server-staging
          clientSecretFile: /etc/alpha/secret
          id: authn
          oidcConfig:
            issuerURL: https://identity-test.diamond.ac.uk/realms/dls
            insecureAllowUnverifiedEmail: true
            audienceClaims:
              - aud
            emailClaim: email
            userIDClaim: fedid
            extraAudiences:
              - workflows-cluster-staging
              - graph
  ingress:
    hosts:
      - argo-workflows.staging.workflows.diamond.ac.uk
    path: /
    tls:
      - secretName: workflows-tls-cert
        hosts:
          - argo-workflows.staging.workflows.diamond.ac.uk

postgresql-ha:
  persistence:
    storageClass: netapp
    size: 10Gi
  postgresql:
    podAntiAffinityPreset: soft

allowTriggerUid: true

authenticatedWorkflows:
  # Enable auth-daemon based authentication method
  # TODO: switch on these chainsaw tests when switching this to true
  # charts/workflows/test-policy/authdaemon/chainsaw-test.yaml
  enableAuthDaemon: false
  # Enables auth-broker + Envoy sidecar injection (replaces auth-daemon)
  # Requires the auth-broker service to be deployed in the auth-broker namespace
  enableEnvoy: true
