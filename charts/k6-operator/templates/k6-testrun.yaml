# k6-resource.yml

apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-ping-graph
  namespace: {{ .Release.Namespace}}
spec:
  parallelism: 4
  script:
    configMap:
      name: k6-configmap
      file: ping-graph.ts
  runner:
    env:
      - name: KEYCLOAK_CLIENT_ID
        valueFrom: 
          secretKeyRef: 
            name: graph-proxy-k6-auth
            key: KEYCLOAK_CLIENT_ID
      - name: KEYCLOAK_CLIENT_SECRET
        valueFrom: 
          secretKeyRef: 
            name: graph-proxy-k6-auth
            key: KEYCLOAK_CLIENT_SECRET
      - name: KEYCLOAK_TOKEN_URL
      {{- if eq .Values.cluster "pollux"}}
        value: https://identity-test.diamond.ac.uk/realms/dls/protocol/openid-connect/token
      {{- else if eq .Values.cluster "argus"}}
        value: https://identity.diamond.ac.uk/realms/dls/protocol/openid-connect/token
      {{- end}}
      - name: OTEL_ENDPOINT
        value: https://otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4318
      - name: GRAPH_URL
        value: http://graph-proxy.graph-proxy.svc.cluster.local:80/graphql
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi
  starter:
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi

