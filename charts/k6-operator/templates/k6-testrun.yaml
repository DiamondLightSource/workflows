# k6-resource.yml

apiVersion: k6.io/v1alpha1
kind: TestRun
metadata:
  name: k6-ping-graph
  namespace: {{ .Release.Namespace}}
spec:
  parallelism: 4
  script:
    configMap:
      name: k6-configmap
      file: ping-graph.ts
  runner:
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi
  starter:
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 500m
        memory: 500Mi