  creationTimestamp: "2026-03-27T11:44:40Z"
  generation: 1
  labels:
    argocd.argoproj.io/instance: i15-1-group
  name: i15-1-notebook-test
  resourceVersion: "4310"
  uid: 90e26c12-1de0-4ca0-b5dd-f9ace76409a0
spec:
  arguments:
  - name: processed_file
    value: i15-1-81948-pe2AD-ae484995-b6fa-440b-8210-e00eb1e1ee06.pe2AD.bragg.nxs
  - name: visitdir
    valueFrom:
      configMapKeyRef:
        key: data_directory
        name: sessionspaces
  entrypoint: notebook
  outputs:
    artifacts:
    - archive:
        none: {}
      name: diffrac-image
      path: /tmp/result_image.png
  templates:
  - container:
      command:
      - tree
      - /dls/session
      image: docker.io/library/busybox:latest
      volumeMounts:
      - mountPath: /dls/session
        name: session
    name: hostpath-mount-example
    volumes:
    - hostPath:
        path: '{{ workflow.parameters.visitdir }}'
        type: Directory
      name: session
  - name: mount-files
    script:
      command:
      - bash
      image: docker.io/library/python:bookworm
      source: |
        echo '' | base64 -d > /tmp/notebook.ipynb
        echo 'bnVtcHk9PTIuMi41Cm1hdHBsb3RsaWI9PTMuMTAuMwpoNXB5PTMuMTMuMApuYmNvbnZlcnQ9PTcuMTYuNgppcHlrZXJuZWw9PTYuMjkuNQppcHl0aG9uPT05LjIuMApwYXBlcm1pbGw9PTIuNi4w' | base64 -d > /tmp/requirements.txt
      volumeMounts:
      - mountPath: /tmp
        name: tmp
  - name: convert-notebook
    script:
      command:
      - bash
      image: docker.io/library/python:bookworm
      source: "python -m venv /tmp/venv\n/tmp/venv/bin/pip install -r /tmp/requirements.txt\n/tmp/venv/bin/python
        -m ipykernel install --prefix=/tmp/venv --name=venv\n/tmp/venv/bin/python
        -m papermill /tmp/notebook.ipynb /tmp/notebook-parametrized.ipynb \\\n  -p
        inpath 'dls/session/processed/{{workflow.parameters.processed_file}}'\n  \n/tmp/venv/bin/python
        -m jupyter nbconvert --execute --allow-errors --to html --output notebook
        --output-dir /tmp /tmp/notebook-parametrized.ipynb\n"
      volumeMounts:
      - mountPath: /tmp
        name: tmp
  volumeClaimTemplates:
  - metadata:
      name: tmp
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: local-path
