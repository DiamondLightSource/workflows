apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: online
spec:
  entrypoint: process-data
  podMetadata:
    labels:
      kueue.x-k8s.io/queue-name: live-queue
      kueue.x-k8s.io/priority-class: high-priority
  templates:
  - name: process-data
    container:
      image: busybox
      command: ["/bin/sh", "-c"]
      args: ["echo 'Processing offline data (low priority)'; sleep 300"]
      resources:
        limits:
          cpu: "4"
          memory: "4Gi"
