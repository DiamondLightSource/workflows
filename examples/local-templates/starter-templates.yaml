apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: local-hello-world
  labels:
    workflows.diamond.ac.uk/local-profile: "true"
  annotations:
    workflows.argoproj.io/title: Local Hello World
    workflows.argoproj.io/description: |
      Minimal local-safe template for checking submitWorkflowTemplate and workflow execution.
spec:
  entrypoint: hello-world
  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory
  templates:
    - name: say-hello
      inputs:
        parameters:
          - name: command
      container:
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args:
          - "{{ inputs.parameters.command }}"
    - name: hello-world
      dag:
        tasks:
          - name: say-hello
            template: say-hello
            arguments:
              parameters:
                - name: command
                  value: |
                    echo "local hello from {{workflow.namespace}}"
                    echo "session dir: {{workflow.parameters.visitdir}}"
---
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: local-conditional-steps
  labels:
    workflows.diamond.ac.uk/local-profile: "true"
  annotations:
    workflows.argoproj.io/title: Local Conditional Steps
    workflows.argoproj.io/description: |
      Small conditional workflow suitable for local testing.
spec:
  entrypoint: workflow-entry
  templates:
    - name: pick-a-number
      script:
        image: python:3.10
        command: [python]
        source: |
          import random
          print(random.randint(1, 11))
    - name: greater-than-five
      script:
        image: python:3.10
        command: [python]
        source: |
          print("This runs when the value is greater than 5")
    - name: less-than-five
      script:
        image: python:3.10
        command: [python]
        source: |
          print("This runs when the value is less than or equal to 5")
    - name: even
      script:
        image: python:3.10
        command: [python]
        source: |
          print("This runs when the value is even")
    - name: workflow-entry
      dag:
        tasks:
          - name: pick-a-number
            template: pick-a-number
          - name: greater-than-5
            template: greater-than-five
            dependencies: [pick-a-number]
            when: "{{tasks.pick-a-number.outputs.result}} > 5"
          - name: less-than-5
            template: less-than-five
            dependencies: [pick-a-number]
            when: "{{tasks.pick-a-number.outputs.result}} <= 5"
          - name: even
            template: even
            dependencies: [pick-a-number]
            when: "{{tasks.pick-a-number.outputs.result}} % 2 == 0"
---
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: local-subscription-benchmark
  labels:
    workflows.diamond.ac.uk/local-profile: "true"
  annotations:
    workflows.argoproj.io/title: Local Subscription Benchmark
    workflows.argoproj.io/description: |
      Short-running multi-step workflow for exercising GraphQL subscriptions locally.
spec:
  entrypoint: workflow-entry
  arguments:
    parameters:
      - name: sleep-seconds
        value: "5"
  templates:
    - name: progress-step
      inputs:
        parameters:
          - name: step
          - name: sleep-seconds
      script:
        image: python:3.10
        command: [python, -u]
        source: |
          import time
          step = "{{inputs.parameters.step}}"
          sleep_seconds = int("{{inputs.parameters.sleep-seconds}}")
          print(f"step {step} starting")
          time.sleep(sleep_seconds)
          print(f"step {step} finished")
    - name: workflow-entry
      dag:
        tasks:
          - name: operation-01
            template: progress-step
            arguments:
              parameters:
                - name: step
                  value: "01"
                - name: sleep-seconds
                  value: "{{workflow.parameters.sleep-seconds}}"
          - name: operation-02
            template: progress-step
            dependencies: [operation-01]
            arguments:
              parameters:
                - name: step
                  value: "02"
                - name: sleep-seconds
                  value: "{{workflow.parameters.sleep-seconds}}"
          - name: operation-03
            template: progress-step
            dependencies: [operation-02]
            arguments:
              parameters:
                - name: step
                  value: "03"
                - name: sleep-seconds
                  value: "{{workflow.parameters.sleep-seconds}}"
