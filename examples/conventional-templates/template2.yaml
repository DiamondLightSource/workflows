apiVersion: argoproj.io/v1alpha1
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate

metadata:
  name: python-hello

  annotations:
    workflows.diamond.ac.uk/owner: "science"
    workflows.argoproj.io/title: "python-hello"
    workflows.argoproj.io/description: "Basic Python workflow example with generated files."
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/category: "science"
    workflows.diamond.ac.uk/type: "live"

spec:
  entrypoint: pipeline

  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory

  volumes:
    - name: tmp
      emptyDir: {}

    - name: workspace
      emptyDir: {}

  templates:

    - name: pipeline
      steps:
        - - name: lint
            template: lint

        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    - name: lint
      container:
        image: python:3.11-slim

        env:
          - name: TMPDIR
            value: /tmp
          - name: PIP_TARGET
            value: /tmp/pip
          - name: PYTHONPATH
            value: /tmp/pip

        command: ["sh", "-c"]

        args:
          - |
            set -e

            mkdir -p /tmp/pip

            echo "Installing ruff..."
            python -m pip install --no-cache-dir -t /tmp/pip ruff

            echo "Creating test Python file..."
            mkdir -p /workspace

            cat <<EOF > /workspace/app.py
            def add(a, b):
                return a + b
            EOF

            echo "Running lint..."
            cd /workspace

            /tmp/pip/bin/ruff check . || true

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp

    - name: run-job
      inputs:
        parameters:
          - name: visitdir

      container:
        image: alpine:3.19
        command: ["sh", "-c"]

        args:
          - |
            set -e

            echo "VisitDir = {{inputs.parameters.visitdir}}"
            echo "Starting long-running test loop..."

            for i in $(seq 1 20); do
              echo "[$i/20] Workflow still running at $(date)"
              sleep 3
            done

            echo "Process complete"

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp