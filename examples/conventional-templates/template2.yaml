apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate

metadata:
  name: python-hello

  annotations:
    workflows.diamond.ac.uk/owner: "science"
    workflows.argoproj.io/title: "python-hello"
    workflows.argoproj.io/description: "Basic Python workflow example with generated files."
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/category: "science"

spec:
  entrypoint: pipeline

  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory

  volumes:
    - name: tmp
      emptyDir: {}

    - name: workspace
      emptyDir: {}

  templates:

    # ==========================================
    # MAIN PIPELINE
    # ==========================================
    - name: pipeline
      steps:

        - - name: generate-files
            template: generate-files

        - - name: lint
            template: lint

        - - name: test
            template: test

        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    # ==========================================
    # GENERATE FAKE PYTHON PROJECT
    # ==========================================
    - name: generate-files

      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            echo "Creating fake Python project..."

            mkdir -p /workspace/tests

            # Main Python file
            cat <<EOF > /workspace/app.py
            def add(a, b):
                return a + b

            if __name__ == "__main__":
                print(add(2, 3))
            EOF

            # Pytest test file
            cat <<EOF > /workspace/tests/test_app.py
            from app import add

            def test_add():
                assert add(2, 3) == 5
            EOF

            echo "Files created successfully"

            echo "Workspace contents:"
            find /workspace

        volumeMounts:
          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 120

    # ==========================================
    # LINT STEP
    # ==========================================
    - name: lint

      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            pip install --quiet --target=/tmp/.local ruff

            export PATH=/tmp/.local/bin:$PATH

            echo "Running lint..."

            cd /workspace

            ruff . --exclude tests

            echo "Lint completed successfully"

        volumeMounts:
          - name: tmp
            mountPath: /tmp

          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 300

    # ==========================================
    # TEST STEP
    # ==========================================
    - name: test

      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            pip install --quiet --target=/tmp/.local pytest

            export PATH=/tmp/.local/bin:$PATH

            echo "Running tests..."

            cd /workspace

            export PYTHONPATH=/workspace

            pytest -q

            echo "Tests completed successfully"

        volumeMounts:
          - name: tmp
            mountPath: /tmp

          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 300

    # ==========================================
    # MAIN PROCESSING STEP
    # ==========================================
    - name: run-job

      inputs:
        parameters:
          - name: visitdir

      container:
        image: alpine:3.19

        command: ["sh", "-c"]

        args:
          - |
            echo "=== LIVE DATA PROCESSING ==="

            echo "User is waiting at beamline"

            sleep 5

            echo "Process complete"

            echo "VisitDir = {{inputs.parameters.visitdir}}"

        volumeMounts:
          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 150
