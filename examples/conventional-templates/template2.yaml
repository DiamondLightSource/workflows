apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate

metadata:
  name: python-hello

  annotations:
    workflows.diamond.ac.uk/owner: "science"
    workflows.argoproj.io/title: "python-hello"
    workflows.argoproj.io/description: "Basic Python workflow example."
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/category: "science"

spec:
  entrypoint: pipeline

  arguments:
    parameters:
      - name: visitdir
        value: "/tmp/data"

  volumes:
    - name: tmp
      emptyDir: {}

    - name: workspace
      emptyDir: {}

  templates:

    # ==========================================
    # MAIN PIPELINE
    # ==========================================
    - name: pipeline
      steps:

        - - name: clone
            template: git-clone

        - - name: lint
            template: lint

        - - name: test
            template: test

        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    # ==========================================
    # GIT CLONE STEP
    # ==========================================
    - name: git-clone
      container:
        image: alpine/git:latest

        command: ["sh", "-c"]

        args:
          - |
            echo "Cloning repository..."

            git clone https://github.com/DiamondLightSource/workflows.git /workspace

            echo "Repository cloned successfully"

            echo "Workspace contents:"
            ls -la /workspace

        volumeMounts:
          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 300

    # ==========================================
    # LINT STEP
    # ==========================================
    - name: lint
      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            pip install --quiet --target=/tmp/.local ruff

            export PATH=/tmp/.local/bin:$PATH

            echo "Running lint..."
            cd /workspace

            ruff . --exclude tests

        volumeMounts:
          - name: tmp
            mountPath: /tmp

          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 300

    # ==========================================
    # TEST STEP
    # ==========================================
    - name: test
      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            pip install --quiet --target=/tmp/.local pytest

            export PATH=/tmp/.local/bin:$PATH

            echo "Running tests..."
            cd /workspace

            pytest -q || true

        volumeMounts:
          - name: tmp
            mountPath: /tmp

          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 500

    # ==========================================
    # MAIN PROCESSING STEP
    # ==========================================
    - name: run-job

      inputs:
        parameters:
          - name: visitdir

      container:
        image: alpine:3.19

        command: ["sh", "-c"]

        args:
          - |
            echo "=== LIVE DATA PROCESSING ==="

            echo "User is waiting at beamline"

            sleep 5

            echo "Process complete"

            echo "VisitDir = {{inputs.parameters.visitdir}}"

        volumeMounts:
          - name: workspace
            mountPath: /workspace

      activeDeadlineSeconds: 150
