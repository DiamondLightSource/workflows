apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate

metadata:
  name: python-hello

  annotations:
    workflows.diamond.ac.uk/owner: "science"
    workflows.argoproj.io/title: "python-hello"
    workflows.argoproj.io/description: "Basic Python workflow example with generated files."
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/category: "science"
    workflows.diamond.ac.uk/type: "live"

spec:
  entrypoint: pipeline

  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory

  volumes:
    - name: workspace
      emptyDir: {}

    - name: tmp
      emptyDir: {}

  templates:

    - name: pipeline
      steps:
        - - name: generate-files
            template: generate-files

        - - name: lint
            template: lint

        - - name: test
            template: test

        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    # -------------------------
    # GENERATE FILES
    # -------------------------
    - name: generate-files
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            set -e

            echo "Creating project..."

            mkdir -p /workspace/tests

            cat <<EOF > /workspace/app.py
            def add(a, b):
                return a + b
            EOF

            cat <<EOF > /workspace/tests/test_app.py
            from app import add

            def test_add():
                assert add(2, 3) == 5
            EOF

            echo "Generated files:"
            find /workspace

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp

    # -------------------------
    # LINT 
    # -------------------------
    - name: lint
      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            set -e

            echo "Checking workspace before lint..."
            find /workspace

            echo "Installing ruff..."
            python -m pip install --no-cache-dir ruff

            echo "Running ruff..."
            if find /workspace -name "*.py" | grep -q .; then
              python -m ruff check /workspace --exclude tests || true
            else
              echo "No Python files found under /workspace"
            fi

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp

    # -------------------------
    # TEST 
    # -------------------------
    - name: test
      container:
        image: python:3.11-slim

        command: ["sh", "-c"]

        args:
          - |
            set -e

            echo "Installing pytest..."
            python -m pip install --no-cache-dir pytest

            echo "Workspace contents:"
            find /workspace

            echo "Running tests..."
            cd /workspace

            PYTHONPATH=/workspace python -m pytest /workspace/tests -q

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp

    # -------------------------
    # LONG RUN STEP
    # -------------------------
    - name: run-job
      inputs:
        parameters:
          - name: visitdir

      container:
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
          - |
            set -e

            echo "VisitDir = {{inputs.parameters.visitdir}}"
            echo "Starting long-running loop..."

            for i in $(seq 1 20); do
              echo "[$i/20] running at $(date)"
              sleep 3
            done

            echo "Process complete"

        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: tmp
            mountPath: /tmp