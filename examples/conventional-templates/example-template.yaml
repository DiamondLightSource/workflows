# yaml-language-server: $schema=https://raw.githubusercontent.com/argoproj/argo-workflows/main/api/jsonschema/schema.json
apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: example-template
  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
  annotations:
    workflows.argoproj.io/title: Example Template
    workflows.argoproj.io/description: |
      This is an example template to use during testing and developement.
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"
    workflows.diamond.ac.uk/parameter-schema.png: |
      {
        "type": "boolean",
        "default": "true"
      }
    workflows.diamond.ac.uk/parameter-schema.jpg: |
      {
        "type": "boolean",
        "default": "true"
      }
    workflows.diamond.ac.uk/parameter-schema.jpeg: |
      {
        "type": "boolean",
        "default": "true"
      }
    workflows.diamond.ac.uk/parameter-schema.tif: |
      {
        "type": "boolean",
        "default": "true"
      }
    workflows.diamond.ac.uk/parameter-schema.tiff: |
      {
        "type": "boolean",
        "default": "true"
      }

spec:
  entrypoint: workflow-entry

  templates:
  - name: pick-a-number
    script:
      image: python:3.10
      command: [python]
      source: |
        import random
        print(random.randint(1,11))

  - name: greater-than-five
    script:
      image: python:3.10
      command: [python]
      source: |
        print("This runs when the value is greater than 5")

  - name: less-than-five
    script:
      image: python:3.10
      command: [python]
      source: |
        print("This runs when the value is less than or equal to 5")

  - name: even
    script:
      image: python:3.10
      command: [python]
      source: |
        print("This runs when the value is even")

  - name: complex
    script:
      image: python:3.10
      command: [python]
      source: |
        print("This is more complex")

  - name: workflow-entry
    dag:
      tasks:
      - name: pick-a-number
        template: pick-a-number

      - name: greater-than-5
        template: greater-than-five
        dependencies: [pick-a-number]
        when: "{{tasks.pick-a-number.outputs.result}} > 5"

      - name: less-than-5
        template: less-than-five
        dependencies: [pick-a-number]
        when: "{{tasks.pick-a-number.outputs.result}} <= 5"

      - name: even
        template: even
        dependencies: [pick-a-number]
        when: "{{tasks.pick-a-number.outputs.result}} % 2 == 0"

      - name: complex-condition
        template: complex
        dependencies: [pick-a-number]
        when: >-
          ( {{tasks.pick-a-number.outputs.result}} < 4 &&
            {{tasks.pick-a-number.outputs.result}} > 1
          ) ||
          ( {{tasks.pick-a-number.outputs.result}} < 9 &&
            {{tasks.pick-a-number.outputs.result}} > 6 )
