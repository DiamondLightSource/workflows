apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: cluster-templates
  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/type: "live"
  annotations:
    workflows.argoproj.io/title: cluster-templates
    workflows.argoproj.io/description: |
      Working ClusterWorkflowTemplate (generate → lint → test → run)
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

spec:
  entrypoint: pipeline

  # FIX: required so pods actually start
  serviceAccountName: default

  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory
      - name: size
        value: "2000"
      - name: memory
        value: "20Gi"

  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
        storageClassName: netapp

  templates:

    # ---------------- PIPELINE ----------------
    - name: pipeline
      dag:
        tasks:
          - name: generate-files
            template: generate-files

          - name: lint
            template: lint
            dependencies:
              - generate-files

          - name: test
            template: test
            dependencies:
              - lint

          - name: run
            template: run-job
            dependencies:
              - test
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    # --------------- GENERATE ----------------
    - name: generate-files
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            echo "Generating files..."
            mkdir -p /workspace/tests

            cat <<EOF > /workspace/app.py
            def add(a, b):
                return a + b
            EOF

            cat <<EOF > /workspace/tests/test_app.py
            from app import add

            def test_add():
                assert add(2, 3) == 5
            EOF

            ls -R /workspace
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # --------------- LINT ----------------
    - name: lint
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            pip install --quiet ruff
            cd /workspace
            echo "Running lint..."
            ruff . --exclude tests || true
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # --------------- TEST ----------------
    - name: test
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            pip install --quiet pytest
            cd /workspace
            export PYTHONPATH=/workspace
            echo "Running tests..."
            pytest -q
        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # --------------- FINAL STEP ----------------
    - name: run-job
      inputs:
        parameters:
          - name: visitdir
      container:
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
          - |
            echo "VisitDir = {{inputs.parameters.visitdir}}"
            echo "Workflow completed successfully"
        volumeMounts:
          - name: workspace
            mountPath: /workspace