apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate

metadata:
  name: python-helloPVC

  annotations:
    workflows.diamond.ac.uk/owner: "science"
    workflows.argoproj.io/title: "python-hello"
    workflows.argoproj.io/description: "Basic Python workflow example with PVC workspace."
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"

  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    workflows.diamond.ac.uk/category: "science"

spec:
  entrypoint: pipeline

  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory

  #  PVC instead of emptyDir
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

  volumes:
    - name: tmp
      emptyDir: {}

  templates:

    - name: pipeline
      steps:
        - - name: generate-files
            template: generate-files

        - - name: lint
            template: lint

        - - name: test
            template: test

        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{workflow.parameters.visitdir}}"

    # =========================
    # GENERATE FILES
    # =========================
    - name: generate-files
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            echo "Creating project in PVC workspace..."
            mkdir -p /workspace/tests

            cat <<EOF > /workspace/app.py
            def add(a, b):
                return a + b
            EOF

            cat <<EOF > /workspace/tests/test_app.py
            from app import add

            def test_add():
                assert add(2, 3) == 5
            EOF

            echo "Files created"
            ls -R /workspace

        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # =========================
    # LINT
    # =========================
    - name: lint
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            pip install --quiet ruff

            echo "Running lint..."
            cd /workspace

            ruff . --exclude tests || true

        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # =========================
    # TEST
    # =========================
    - name: test
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            pip install --quiet pytest

            echo "Running tests..."
            cd /workspace

            export PYTHONPATH=/workspace
            pytest -q

        volumeMounts:
          - name: workspace
            mountPath: /workspace

    # =========================
    # RUN
    # =========================
    - name: run-job
      inputs:
        parameters:
          - name: visitdir
      container:
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
          - |
            echo "VisitDir = {{inputs.parameters.visitdir}}"
            echo "Process complete"

        volumeMounts:
          - name: workspace
            mountPath: /workspace