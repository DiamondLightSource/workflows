apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: python-hellow
  annotations:
    workflows.diamond.ac.uk/type: live
    workflows.argoproj.io/description: |
      Just a basic test workflow.
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"
  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    kueue.x-k8s.io/priority-class: high


spec:
  entrypoint: pipeline
  arguments:
    parameters:
    - name: visitdir
      valueFrom:
        configMapKeyRef:
          name: sessionspaces
          key: data_directory



  templates:

  #PIPELINE
  - name: pipeline
    steps:
      - - name: lint
          template: lint
      - - name: test
          template: test
      - - name: run
          template: run-job
          arguments:
             parameters:
               - name: visitdir
                 value: "{{ workflow.parameters.visitdir }}"

  #LINT
  - name: lint
    container:
      image: python:3.11
      command: [sh, -c]
      args:
        - |
          pip install flake8
          echo "Running lint..."
          flake8 . || exit 1

  #TEST
  - name: test
    container:
      image: python:3.11
      command: [sh, -c]
      args:
        - |
          pip install pytest
          echo "Running tests..."
          pytest -q || exit 1


  #RUN STEP
  - name: run-job
    inputs:
      parameters:
          - name: visitdir
    container:
      image: alpine:3.19
      command: [sh, -c]
      args:
        - |
          echo "Pipeline complete"
          echo "VisitDir = {{inputs.parameters.visitdir}}"
          echo "TOKEN is available"

