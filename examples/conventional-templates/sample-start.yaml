apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: python-hellow
  annotations:
    workflows.diamond.ac.uk/type: live
    workflows.argoproj.io/description: |
      Just a basic test workflow.
    workflows.diamond.ac.uk/repository: "https://github.com/DiamondLightSource/workflows"
  labels:
    workflows.diamond.ac.uk/science-group-examples: "true"
    kueue.x-k8s.io/priority-class: high
spec:
  entrypoint: pipeline
  arguments:
    parameters:
      - name: visitdir
        valueFrom:
          configMapKeyRef:
            name: sessionspaces
            key: data_directory

  volumes:
    # Writable temp dir for pip installs and temp files
    - name: tmp
      emptyDir: {}

    # Persistent workspace
    - name: workspace
      persistentVolumeClaim:
        claimName: workspace-pvc

  templates:

    # PIPELINE
    - name: pipeline
      steps:
        - - name: lint
            template: lint
        - - name: test
            template: test
        - - name: run
            template: run-job
            arguments:
              parameters:
                - name: visitdir
                  value: "{{ workflow.parameters.visitdir }}"

    # LINT STEP (using ruff, excluding tests)
    - name: lint
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            # Install ruff in writable temp
            pip install --quiet --target=/tmp/.local ruff
            export PATH=/tmp/.local/bin:$PATH

            cd /workspace
            echo "Running lint (excluding tests)..."
            ruff . --exclude tests || exit 1
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: workspace
            mountPath: /workspace

    # TEST STEP (using pytest)
    - name: test
      container:
        image: python:3.11-slim
        command: ["sh", "-c"]
        args:
          - |
            # Install pytest in writable temp
            pip install --quiet --target=/tmp/.local pytest
            export PATH=/tmp/.local/bin:$PATH

            cd /workspace
            echo "Running tests..."
            pytest -q || exit 1
        volumeMounts:
          - name: tmp
            mountPath: /tmp
          - name: workspace
            mountPath: /workspace

    # RUN JOB STEP
    - name: run-job
      inputs:
        parameters:
          - name: visitdir
      container:
        image: alpine:3.19
        command: ["sh", "-c"]
        args:
          - |
            echo "Pipeline complete"
            echo "VisitDir = {{inputs.parameters.visitdir}}"
            echo "TOKEN is available"
