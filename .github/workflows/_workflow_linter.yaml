name: Workflow Lint Action

on:
  workflow_call:

jobs:
  test_action:
    name: GitHub Actions Test
    needs: build_container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        id: check_diff
        shell: bash
        run: |
          git fetch origin main
          if git diff --quiet origin/main -- workflow-lint-action; then
            echo "No changes in ./workflow-lint-action. Skipping test."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Test Local Action
        if: steps.check_diff.outputs.skip == 'false'
        uses: ./

  build_container:
    name: Build action container
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Generate Image Name
        run: echo IMAGE_REPOSITORY=ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '[_]' '[\-]')-workflow-lint-action >> $GITHUB_ENV

      - name: Log in to GitHub Docker Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Version from Tag
        id: tags
        run: echo version=$(echo "${{ github.ref }}" | awk -F '[@v]' '{print $3}') >> $GITHUB_OUTPUT 

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.version }}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build Image
        uses: docker/build-push-action@v6.17.0
        with:
          context: ./workflow-lint-action
          target: runtime
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/workflow-lint-action@') }}
          load: ${{ !(github.event_name == 'push' && startsWith(github.ref, 'refs/tags/workflow-lint-action@')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 